name: Build Windows Desktop

# Viro 데스크톱(윈도우) 설치 파일을 Windows 러너에서 빌드해 릴리스에 업로드한다.
# macOS에서는 NSIS 크로스빌드가 안 되므로(윈도우 러너 필요) 이 워크플로우로 처리한다.
#
# 실행 방법:
#  - 수동: Actions 탭 > Build Windows Desktop > Run workflow (release_tag 입력, 예: v0.2.2)
#  - 태그: v* 태그를 push 하면 자동 실행
# 산출물: Viro-<version>-setup.exe (package.json build.win.artifactName 과 동일)

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: '업로드할 릴리스 태그 (예: v0.2.2)'
        required: true
        default: 'v0.2.2'
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build electron bundle
        run: npm run agent:app:build

      - name: Package Windows installer (NSIS)
        run: npx electron-builder --win nsis --publish never

      - name: Locate installer
        id: artifact
        shell: bash
        run: |
          FILE=$(ls agent/electron/out/*setup*.exe | head -1)
          echo "path=$FILE" >> "$GITHUB_OUTPUT"
          echo "빌드된 설치 파일: $FILE"

      - name: Resolve release tag
        id: tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "value=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${{ github.event.inputs.release_tag }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.value }}
          files: ${{ steps.artifact.outputs.path }}
          fail_on_unmatched_files: true
